name: rfid_scanner_app
description: "Standalone RFID + Prestart app — extracted from vis_tac_app, restructured for modular integration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  logger: ^1.1.0
  usb_serial: ^0.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/prestart_questions.json
